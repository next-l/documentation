<link
  rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
<link href="/assets/css/admonitionblock-icon.css" rel="stylesheet" type="text/css" media="all">
{% assign lang = site.search.language | default: "" %}
{% if lang != "" %}
    {% assign target = "/assets/js/vendor/lunr-languages/lunr." | append: lang | append: ".js" %}
    {% assign files = site.static_files | where: "path", target %}
    {% if files.size > 0 %}
        <script src="/assets/js/vendor/lunr-languages/lunr.stemmer.support.js"></script>
        <script src="/assets/js/vendor/lunr-languages/tinyseg.js"></script>
        <script src="{{ target }}"></script>
    {% endif %}
{% endif %}
