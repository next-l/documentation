name: Publish to GitHub Pages
on:
  push:
    branches: [main, master]
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: "pages"
  cancel-in-progress: true
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
      - name: Install GraphicMagick
        run: |
          sudo apt update
          sudo apt-get install -y build-essential libgraphicsmagick1-dev
          sudo apt-get install -y graphicsmagick-imagemagick-compat graphicsmagick-libmagick-dev-compat
      - name: Install Ruby and Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.4'
          bundler-cache: true
          cache-version: 1
      - name: Generate Site
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Generate PDFs
        run: |
          bundle exec _pdf/convert-adoc2pdf.rb _pdf/1.4/enju_*_all.adoc
          mv _pdf/1.4/enju_*_all.pdf _site/1.4/
          bundle exec _pdf/convert-adoc2pdf.rb _pdf/1.5/enju_*_all.adoc
          mv _pdf/1.5/enju_*_all.pdf _site/1.5/
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./_site
  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
